{% extends "base.html" %}
{% block title %}Отзывы и вопросы{% endblock %}
{% block content %}
<div x-data="reviewsApp()" x-init="init()" class="p-6 max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold" style="color:var(--text)">Отзывы и вопросы</h1>
        <button @click="loadStats(); loadItems()" class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"
                style="background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border)">
            Обновить
        </button>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="rounded-xl p-4" style="background:var(--bg-card);border:1px solid var(--border)">
            <div class="text-sm" style="color:var(--text-secondary)">Средний рейтинг</div>
            <div class="text-2xl font-bold mt-1" style="color:var(--text)">
                <span x-text="stats.avg_rating ? stats.avg_rating.toFixed(1) : '—'"></span>
                <span class="text-yellow-500 text-lg">★</span>
            </div>
        </div>
        <div class="rounded-xl p-4" style="background:var(--bg-card);border:1px solid var(--border)">
            <div class="text-sm" style="color:var(--text-secondary)">Без ответа (отзывы)</div>
            <div class="text-2xl font-bold mt-1" style="color:#ef4444" x-text="stats.feedbacks_unanswered ?? '—'"></div>
        </div>
        <div class="rounded-xl p-4" style="background:var(--bg-card);border:1px solid var(--border)">
            <div class="text-sm" style="color:var(--text-secondary)">Без ответа (вопросы)</div>
            <div class="text-2xl font-bold mt-1" style="color:#f59e0b" x-text="stats.questions_unanswered ?? '—'"></div>
        </div>
        <div class="rounded-xl p-4" style="background:var(--bg-card);border:1px solid var(--border)">
            <div class="text-sm" style="color:var(--text-secondary)">Всего отзывов</div>
            <div class="text-2xl font-bold mt-1" style="color:var(--text)" x-text="stats.feedbacks_total ?? '—'"></div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex items-center gap-2 mb-4">
        <div class="flex gap-2">
            <button @click="tab='feedbacks'; loadItems()"
                    class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"
                    :style="tab === 'feedbacks' ? 'background:var(--accent);color:#fff' : 'background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border)'">
                Отзывы
                <span x-show="stats.feedbacks_unanswered > 0" class="ml-1 px-1.5 py-0.5 rounded-full text-xs bg-red-500 text-white" x-text="stats.feedbacks_unanswered"></span>
            </button>
            <button @click="tab='questions'; loadItems()"
                    class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"
                    :style="tab === 'questions' ? 'background:var(--accent);color:#fff' : 'background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border)'">
                Вопросы
                <span x-show="stats.questions_unanswered > 0" class="ml-1 px-1.5 py-0.5 rounded-full text-xs bg-yellow-500 text-black" x-text="stats.questions_unanswered"></span>
            </button>
        </div>
        <div class="flex-1"></div>
        <label class="flex items-center gap-2 text-sm cursor-pointer" style="color:var(--text-secondary)">
            <input type="checkbox" x-model="showAnswered" @change="loadItems()" class="rounded" style="accent-color:var(--accent)">
            Показать отвеченные
        </label>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex justify-center py-16">
        <svg class="animate-spin h-8 w-8" style="color:var(--accent)" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
    </div>

    <!-- Items list -->
    <div x-show="!loading" class="space-y-3">
        <template x-for="(item, idx) in items" :key="item.id">
            <div class="rounded-xl p-5" style="background:var(--bg-card);border:1px solid var(--border)">
                <!-- Header row -->
                <div class="flex items-start justify-between mb-3">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 mb-1 flex-wrap">
                            <span class="text-sm font-semibold" style="color:var(--text)" x-text="item.productDetails?.productName || 'Товар'"></span>
                            <span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--accent-light);color:var(--accent)" x-text="item.productDetails?.brandName"></span>
                            <template x-if="tab === 'feedbacks'">
                                <span class="text-yellow-500 text-sm" x-text="'★'.repeat(item.productValuation || 0) + '☆'.repeat(5 - (item.productValuation || 0))"></span>
                            </template>
                        </div>
                        <div class="text-xs" style="color:var(--text-muted)">
                            <span x-text="item.userName || 'Покупатель'"></span> ·
                            <span x-text="formatDate(item.createdDate)"></span> ·
                            nmId: <span x-text="item.productDetails?.nmId"></span>
                        </div>
                    </div>
                    <template x-if="item.answer">
                        <span class="text-xs px-2 py-1 rounded-full flex-shrink-0" style="background:#dcfce7;color:#16a34a">Отвечен</span>
                    </template>
                </div>

                <!-- Review text -->
                <div class="mb-3" style="color:var(--text)">
                    <p x-show="item.text" x-text="item.text" class="text-sm leading-relaxed"></p>
                    <template x-if="item.pros">
                        <p class="text-sm mt-2"><span class="font-medium" style="color:#16a34a">Достоинства:</span> <span x-text="item.pros"></span></p>
                    </template>
                    <template x-if="item.cons">
                        <p class="text-sm mt-1"><span class="font-medium" style="color:#ef4444">Недостатки:</span> <span x-text="item.cons"></span></p>
                    </template>
                </div>

                <!-- Existing answer -->
                <template x-if="item.answer">
                    <div class="rounded-lg p-3 mb-3" style="background:var(--bg);border-left:3px solid var(--accent)">
                        <div class="text-xs mb-1 font-medium" style="color:var(--text-secondary)">Ваш ответ:</div>
                        <p class="text-sm" style="color:var(--text)" x-text="item.answer.text"></p>
                    </div>
                </template>

                <!-- Reply section (only for unanswered) -->
                <template x-if="!item.answer">
                    <div>
                        <div class="flex gap-2 mb-2" x-show="!item._draft">
                            <button @click="generateReply(idx)"
                                    :disabled="item._generating"
                                    class="px-3 py-1.5 rounded-lg text-sm font-medium text-white transition-all"
                                    :style="item._generating ? 'background:var(--accent);opacity:0.6;cursor:wait' : 'background:var(--accent)'">
                                <span x-show="!item._generating">Сгенерировать ответ</span>
                                <span x-show="item._generating">Генерация...</span>
                            </button>
                        </div>
                        <div x-show="item._draft">
                            <textarea x-model="items[idx]._draft" rows="3"
                                class="w-full rounded-lg p-3 text-sm resize-y focus:outline-none focus:ring-1"
                                style="background:var(--bg);border:1px solid var(--border);color:var(--text);--tw-ring-color:var(--accent)"
                                placeholder="Текст ответа..."></textarea>
                            <div class="flex items-center justify-between mt-2">
                                <span class="text-xs" style="color:var(--text-muted)" x-text="(item._draft || '').length + '/5000'"></span>
                                <div class="flex gap-2">
                                    <button @click="items[idx]._draft = ''" class="px-3 py-1.5 rounded-lg text-sm transition-colors"
                                            style="color:var(--text-secondary);border:1px solid var(--border)">Отмена</button>
                                    <button @click="sendReply(idx)"
                                            :disabled="item._sending || !item._draft || item._draft.length < 2"
                                            class="px-4 py-1.5 rounded-lg text-sm font-medium text-white transition-colors"
                                            :style="item._sending ? 'background:#22c55e;opacity:0.6' : 'background:#22c55e'">
                                        <span x-show="!item._sending">Отправить ответ</span>
                                        <span x-show="item._sending">Отправка...</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- Empty state -->
        <div x-show="!loading && items.length === 0" class="rounded-xl p-12 text-center" style="background:var(--bg-card);border:1px solid var(--border)">
            <svg class="mx-auto h-12 w-12 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:var(--text-secondary)">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
            <p style="color:var(--text-secondary)" x-text="showAnswered ? 'Нет отзывов за выбранный период' : 'Все отзывы обработаны!'"></p>
        </div>

        <!-- Load more -->
        <div x-show="hasMore && items.length > 0" class="text-center pt-4">
            <button @click="loadMore()"
                    :disabled="loadingMore"
                    class="px-6 py-2 rounded-lg text-sm font-medium transition-colors"
                    style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary)">
                <span x-show="!loadingMore">Загрузить ещё</span>
                <span x-show="loadingMore">Загрузка...</span>
            </button>
        </div>
    </div>
</div>

<script>
function reviewsApp() {
    return {
        tab: 'feedbacks',
        showAnswered: false,
        loading: true,
        loadingMore: false,
        items: [],
        stats: {},
        skip: 0,
        batchSize: 30,
        hasMore: false,

        async init() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('tab') === 'questions') this.tab = 'questions';
            await this.loadStats();
            await this.loadItems();
            fetch('/api/reviews/check-new', {method: 'POST'}).catch(() => {});
        },

        _prepareItems(items) {
            return items.map(item => ({
                ...item,
                _draft: '',
                _generating: false,
                _sending: false
            }));
        },

        async loadStats() {
            try {
                const resp = await fetch('/api/reviews/stats');
                if (resp.ok) this.stats = await resp.json();
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        },

        async loadItems() {
            this.loading = true;
            this.skip = 0;
            this.items = [];
            try {
                const endpoint = this.tab === 'feedbacks' ? '/api/reviews/feedbacks' : '/api/reviews/questions';
                const params = new URLSearchParams({
                    isAnswered: this.showAnswered,
                    take: this.batchSize,
                    skip: 0,
                    order: 'dateDesc'
                });
                const resp = await fetch(`${endpoint}?${params}`);
                if (resp.ok) {
                    const json = await resp.json();
                    const data = json.data || {};
                    const raw = (this.tab === 'feedbacks' ? data.feedbacks : data.questions) || [];
                    this.items = this._prepareItems(raw);
                    this.skip = this.items.length;
                    const total = this.showAnswered ? (data.countArchive || 0) : (data.countUnanswered || 0);
                    this.hasMore = this.skip < total;
                }
            } catch (e) {
                console.error('Failed to load items:', e);
            }
            this.loading = false;
        },

        async loadMore() {
            this.loadingMore = true;
            try {
                const endpoint = this.tab === 'feedbacks' ? '/api/reviews/feedbacks' : '/api/reviews/questions';
                const params = new URLSearchParams({
                    isAnswered: this.showAnswered,
                    take: this.batchSize,
                    skip: this.skip,
                    order: 'dateDesc'
                });
                const resp = await fetch(`${endpoint}?${params}`);
                if (resp.ok) {
                    const json = await resp.json();
                    const data = json.data || {};
                    const raw = (this.tab === 'feedbacks' ? data.feedbacks : data.questions) || [];
                    this.items = [...this.items, ...this._prepareItems(raw)];
                    this.skip += raw.length;
                    const total = this.showAnswered ? (data.countArchive || 0) : (data.countUnanswered || 0);
                    this.hasMore = this.skip < total;
                }
            } catch (e) {
                console.error('Failed to load more:', e);
            }
            this.loadingMore = false;
        },

        async generateReply(idx) {
            const item = this.items[idx];
            this.items[idx]._generating = true;
            try {
                const body = {
                    type: this.tab === 'feedbacks' ? 'feedback' : 'question',
                    text: item.text || '',
                    productName: item.productDetails?.productName || '',
                    rating: item.productValuation,
                    pros: item.pros || '',
                    cons: item.cons || '',
                    userName: item.userName || ''
                };
                const resp = await fetch('/api/reviews/generate-reply', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                if (resp.ok) {
                    const json = await resp.json();
                    this.items[idx]._draft = json.reply;
                } else {
                    const err = await resp.json().catch(() => ({}));
                    alert('Ошибка генерации: ' + (err.error || 'Неизвестная ошибка'));
                }
            } catch (e) {
                console.error('Failed to generate reply:', e);
                alert('Ошибка: ' + e.message);
            }
            this.items[idx]._generating = false;
        },

        async sendReply(idx) {
            const item = this.items[idx];
            if (!item._draft || item._draft.length < 2) return;
            this.items[idx]._sending = true;
            try {
                const resp = await fetch('/api/reviews/send-reply', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: item.id,
                        text: item._draft,
                        type: this.tab === 'feedbacks' ? 'feedback' : 'question'
                    })
                });
                if (resp.ok) {
                    this.items[idx].answer = { text: item._draft };
                    this.items[idx]._draft = '';
                    if (this.tab === 'feedbacks') {
                        this.stats.feedbacks_unanswered = Math.max(0, (this.stats.feedbacks_unanswered || 0) - 1);
                    } else {
                        this.stats.questions_unanswered = Math.max(0, (this.stats.questions_unanswered || 0) - 1);
                    }
                } else {
                    const err = await resp.json().catch(() => ({}));
                    alert('Ошибка: ' + (err.error || 'Неизвестная ошибка'));
                }
            } catch (e) {
                console.error('Failed to send reply:', e);
                alert('Ошибка отправки: ' + e.message);
            }
            this.items[idx]._sending = false;
        },

        formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
        }
    };
}
</script>
{% endblock %}
