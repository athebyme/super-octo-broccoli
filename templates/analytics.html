{% extends "base.html" %}

{% block title %}Аналитика - Seller Hub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="analyticsPage()">

    <!-- Header -->
    <div class="mb-8 relative bg-[#0a0a0a] rounded-lg p-6 sm:p-8">
        <div class="relative flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-normal text-white" style="font-family:'Instrument Serif',Georgia,serif;font-style:italic">Аналитика продаж</h1>
                <p class="mt-1 text-sm text-gray-400">Данные воронки продаж Wildberries</p>
            </div>
            <div class="flex items-center gap-3">
                <!-- Refresh button -->
                <button @click="refreshData()" :disabled="loading"
                    class="px-3 py-1.5 text-sm rounded-md bg-white/10 text-white/80 hover:text-white hover:bg-white/20 transition-all disabled:opacity-50">
                    <svg class="w-4 h-4 inline-block mr-1" :class="loading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Обновить
                </button>
                <!-- Period selector -->
                <div class="inline-flex rounded-md bg-white/10 p-1">
                    <template x-for="p in periods" :key="p.value">
                        <button @click="changePeriod(p.value)"
                            :class="period === p.value ? 'bg-white shadow-sm text-[#1a1a1a] font-semibold' : 'text-white/80 hover:text-white hover:bg-white/10'"
                            class="px-3 py-1.5 text-sm rounded-md transition-all" x-text="p.label"></button>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <template x-if="loading && !hasData">
        <div class="flex items-center justify-center py-20">
            <div class="text-center">
                <svg class="animate-spin h-10 w-10 text-indigo-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <p class="text-gray-500">Загрузка аналитики...</p>
            </div>
        </div>
    </template>

    <!-- Error message -->
    <template x-if="error && !hasData">
        <div class="bg-red-50 border border-red-200 rounded-xl p-6 mb-8">
            <p class="text-red-700" x-text="error"></p>
            <button @click="loadData()" class="mt-3 text-sm text-red-600 underline">Попробовать снова</button>
        </div>
    </template>

    <template x-if="hasData || !loading">
    <div>
    <!-- KPI Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <!-- Revenue -->
        <div class="relative overflow-hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 group hover:shadow-md transition-shadow">
            <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-indigo-500/10 to-transparent rounded-bl-full"></div>
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <template x-if="kpi.dynamics.revenue !== null && kpi.dynamics.revenue !== 0">
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium"
                        :class="kpi.dynamics.revenue >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                :d="kpi.dynamics.revenue >= 0 ? 'M5 10l7-7m0 0l7 7m-7-7v18' : 'M19 14l-7 7m0 0l-7-7m7 7V3'"/>
                        </svg>
                        <span x-text="(kpi.dynamics.revenue >= 0 ? '+' : '') + kpi.dynamics.revenue.toFixed(1) + '%'"></span>
                    </span>
                </template>
            </div>
            <p class="text-sm text-gray-500 mb-1">Заказы (сумма)</p>
            <p class="text-2xl font-bold text-gray-900" x-text="formatMoney(kpi.revenue)"></p>
            <div class="mt-3 h-10">
                <canvas x-ref="sparkRevenue"></canvas>
            </div>
        </div>

        <!-- Orders -->
        <div class="relative overflow-hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 group hover:shadow-md transition-shadow">
            <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-blue-500/10 to-transparent rounded-bl-full"></div>
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                    </svg>
                </div>
                <template x-if="kpi.dynamics.orders !== null && kpi.dynamics.orders !== 0">
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium"
                        :class="kpi.dynamics.orders >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                :d="kpi.dynamics.orders >= 0 ? 'M5 10l7-7m0 0l7 7m-7-7v18' : 'M19 14l-7 7m0 0l-7-7m7 7V3'"/>
                        </svg>
                        <span x-text="(kpi.dynamics.orders >= 0 ? '+' : '') + kpi.dynamics.orders.toFixed(1) + '%'"></span>
                    </span>
                </template>
            </div>
            <p class="text-sm text-gray-500 mb-1">Заказы (шт.)</p>
            <p class="text-2xl font-bold text-gray-900" x-text="kpi.orders.toLocaleString('ru-RU')"></p>
            <div class="mt-3 h-10">
                <canvas x-ref="sparkOrders"></canvas>
            </div>
        </div>

        <!-- Average Check -->
        <div class="relative overflow-hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 group hover:shadow-md transition-shadow">
            <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-emerald-500/10 to-transparent rounded-bl-full"></div>
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                </div>
            </div>
            <p class="text-sm text-gray-500 mb-1">Средний чек</p>
            <p class="text-2xl font-bold text-gray-900" x-text="formatMoney(kpi.avgCheck)"></p>
            <div class="mt-3 h-10">
                <canvas x-ref="sparkAvgCheck"></canvas>
            </div>
        </div>

        <!-- Buyouts -->
        <div class="relative overflow-hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 group hover:shadow-md transition-shadow">
            <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-amber-500/10 to-transparent rounded-bl-full"></div>
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-500 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <template x-if="kpi.dynamics.buyouts !== null && kpi.dynamics.buyouts !== 0">
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium"
                        :class="kpi.dynamics.buyouts >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                :d="kpi.dynamics.buyouts >= 0 ? 'M5 10l7-7m0 0l7 7m-7-7v18' : 'M19 14l-7 7m0 0l-7-7m7 7V3'"/>
                        </svg>
                        <span x-text="(kpi.dynamics.buyouts >= 0 ? '+' : '') + kpi.dynamics.buyouts.toFixed(1) + '%'"></span>
                    </span>
                </template>
            </div>
            <p class="text-sm text-gray-500 mb-1">Выкупы</p>
            <p class="text-2xl font-bold text-gray-900" x-text="kpi.buyouts.toLocaleString('ru-RU')"></p>
            <div class="mt-3 h-10">
                <canvas x-ref="sparkBuyouts"></canvas>
            </div>
        </div>
    </div>

    <!-- Conversion funnel -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-center">
            <p class="text-sm text-gray-500 mb-1">Переходы в карточку</p>
            <p class="text-xl font-bold text-gray-900" x-text="kpi.openCardCount.toLocaleString('ru-RU')"></p>
            <div class="mt-2 flex items-center justify-center gap-1 text-xs text-indigo-600">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                <span x-text="kpi.conversions.addToCartPercent.toFixed(1) + '% в корзину'"></span>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-center">
            <p class="text-sm text-gray-500 mb-1">Добавили в корзину</p>
            <p class="text-xl font-bold text-gray-900" x-text="kpi.addToCartCount.toLocaleString('ru-RU')"></p>
            <div class="mt-2 flex items-center justify-center gap-1 text-xs text-indigo-600">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                <span x-text="kpi.conversions.cartToOrderPercent.toFixed(1) + '% в заказ'"></span>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-center">
            <p class="text-sm text-gray-500 mb-1">Процент выкупа</p>
            <p class="text-xl font-bold text-gray-900" x-text="kpi.conversions.buyoutPercent.toFixed(1) + '%'"></p>
            <div class="mt-2 flex items-center justify-center gap-1 text-xs text-gray-400">
                <span x-text="'Отмены: ' + kpi.cancels.toLocaleString('ru-RU')"></span>
            </div>
        </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <!-- Sales chart (2 cols) -->
        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 relative overflow-hidden">
            <svg class="absolute top-0 right-0 w-32 h-32 opacity-[0.03]" viewBox="0 0 120 120" fill="none"><path d="M10 100L30 60L55 75L80 30L110 50" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><circle cx="30" cy="60" r="5" fill="currentColor"/><circle cx="55" cy="75" r="5" fill="currentColor"/><circle cx="80" cy="30" r="5" fill="currentColor"/><circle cx="110" cy="50" r="5" fill="currentColor"/></svg>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-gray-900">Динамика продаж</h2>
                <div class="flex items-center gap-4 text-xs">
                    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-indigo-500"></span> Заказы (руб)</span>
                    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-400"></span> Заказы (шт)</span>
                </div>
            </div>
            <div class="h-72">
                <canvas x-ref="salesChart"></canvas>
            </div>
            <template x-if="!dailyData.length && !loadingDaily">
                <div class="absolute inset-0 flex items-center justify-center bg-white/80">
                    <button @click="loadDailyData()" class="px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600 transition">
                        Загрузить данные по дням
                    </button>
                </div>
            </template>
            <template x-if="loadingDaily">
                <div class="absolute inset-0 flex items-center justify-center bg-white/80">
                    <svg class="animate-spin h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </div>
            </template>
        </div>

        <!-- Conversions donut -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-6">Воронка конверсий</h2>
            <div class="h-56 flex items-center justify-center">
                <canvas x-ref="funnelDonut"></canvas>
            </div>
            <div class="mt-4 space-y-2">
                <div class="flex items-center justify-between text-sm">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-indigo-500"></span>
                        <span class="text-gray-600">Просмотры</span>
                    </span>
                    <span class="font-medium text-gray-900" x-text="kpi.openCardCount.toLocaleString('ru-RU')"></span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                        <span class="text-gray-600">В корзину</span>
                    </span>
                    <span class="font-medium text-gray-900" x-text="kpi.addToCartCount.toLocaleString('ru-RU')"></span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                        <span class="text-gray-600">Заказы</span>
                    </span>
                    <span class="font-medium text-gray-900" x-text="kpi.orders.toLocaleString('ru-RU')"></span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                        <span class="text-gray-600">Выкупы</span>
                    </span>
                    <span class="font-medium text-gray-900" x-text="kpi.buyouts.toLocaleString('ru-RU')"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Top Products -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 relative overflow-hidden">
            <svg class="absolute -right-4 -top-4 w-24 h-24 opacity-[0.04]" viewBox="0 0 100 100" fill="none"><path d="M50 5L60 35H95L67 55L77 85L50 67L23 85L33 55L5 35H40Z" fill="currentColor"/></svg>
            <div class="flex items-center gap-3 mb-6">
                <div class="w-8 h-8 bg-gradient-to-br from-amber-400 to-orange-500 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-900">Топ товаров по заказам</h2>
            </div>
            <div class="space-y-4">
                <template x-for="(product, idx) in topProducts" :key="idx">
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <div class="flex items-center gap-3">
                                <span class="w-6 h-6 rounded-lg bg-indigo-50 text-indigo-600 text-xs font-bold flex items-center justify-center" x-text="idx + 1"></span>
                                <div>
                                    <span class="text-sm font-medium text-gray-800 truncate max-w-[200px] block" x-text="product.title || product.vendorCode"></span>
                                    <span class="text-xs text-gray-400" x-text="product.brandName"></span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-semibold text-gray-900 block" x-text="formatMoney(product.orderSum)"></span>
                                <span class="text-xs text-gray-400" x-text="product.orderCount + ' шт.'"></span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2">
                            <div class="h-2 rounded-full bg-indigo-500 transition-all duration-500"
                                :style="'width:' + (topProducts.length ? (product.orderSum / topProducts[0].orderSum * 100) : 0) + '%'"></div>
                        </div>
                    </div>
                </template>
                <template x-if="!topProducts.length">
                    <p class="text-sm text-gray-400 text-center py-4">Нет данных за выбранный период</p>
                </template>
            </div>
        </div>

        <!-- Product Analytics Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 relative overflow-hidden">
            <svg class="absolute -right-2 -top-2 w-20 h-20 opacity-[0.04]" viewBox="0 0 80 80" fill="none"><rect x="10" y="10" width="60" height="60" rx="8" stroke="currentColor" stroke-width="3"/><path d="M25 35h30M25 45h20M25 55h25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            <div class="flex items-center gap-3 mb-6">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-900">Детализация по товарам</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 border-b border-gray-100">
                            <th class="pb-3 font-medium">Товар</th>
                            <th class="pb-3 font-medium text-right">Заказы</th>
                            <th class="pb-3 font-medium text-right">Выкупы</th>
                            <th class="pb-3 font-medium text-right">Выкуп %</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <template x-for="(item, idx) in productsList" :key="idx">
                            <tr class="hover:bg-gray-50/50">
                                <td class="py-3">
                                    <p class="font-medium text-gray-800 truncate max-w-[180px]" x-text="item.title || item.vendorCode"></p>
                                    <p class="text-xs text-gray-400" x-text="item.brandName + ' | ' + item.vendorCode"></p>
                                </td>
                                <td class="py-3 text-right">
                                    <span class="font-medium text-gray-900" x-text="formatMoney(item.ordersSum)"></span>
                                    <p class="text-xs text-gray-400" x-text="item.ordersCount + ' шт.'"></p>
                                </td>
                                <td class="py-3 text-right">
                                    <span class="font-medium text-gray-900" x-text="formatMoney(item.buyoutsSum)"></span>
                                    <p class="text-xs text-gray-400" x-text="item.buyoutsCount + ' шт.'"></p>
                                </td>
                                <td class="py-3 text-right">
                                    <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                                        :class="item.conversions.buyoutPercent >= 50 ? 'bg-green-50 text-green-700' : item.conversions.buyoutPercent >= 30 ? 'bg-yellow-50 text-yellow-700' : 'bg-red-50 text-red-600'"
                                        x-text="item.conversions.buyoutPercent.toFixed(0) + '%'"></span>
                                </td>
                            </tr>
                        </template>
                        <template x-if="!productsList.length">
                            <tr><td colspan="4" class="py-6 text-center text-gray-400">Нет данных</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Data age indicator -->
    <template x-if="dataAge">
        <div class="mt-6 text-center text-xs text-gray-400">
            <span x-text="'Данные обновлены: ' + dataAge"></span>
        </div>
    </template>
    </div>
    </template>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
function analyticsPage() {
    return {
        period: '30d',
        loading: false,
        loadingDaily: false,
        error: null,
        hasData: false,
        dataAge: null,
        periods: [
            { label: '7д', value: '7d' },
            { label: '30д', value: '30d' },
            { label: '90д', value: '90d' },
            { label: 'Год', value: '1y' },
        ],
        kpi: {
            revenue: 0, orders: 0, avgCheck: 0, buyouts: 0, cancels: 0,
            openCardCount: 0, addToCartCount: 0,
            dynamics: { revenue: null, orders: null, buyouts: null },
            conversions: { addToCartPercent: 0, cartToOrderPercent: 0, buyoutPercent: 0 },
        },
        topProducts: [],
        productsList: [],
        dailyData: [],
        salesChart: null,
        funnelChart: null,
        sparkCharts: {},

        formatMoney(val) {
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(val || 0);
        },

        init() {
            this.loadData();
        },

        changePeriod(p) {
            if (this.period === p) return;
            this.period = p;
            this.dailyData = [];
            this.loadData();
        },

        async loadData() {
            this.loading = true;
            this.error = null;
            try {
                const resp = await fetch(`/api/analytics/summary?period=${this.period}`);
                const json = await resp.json();
                if (!resp.ok) throw new Error(json.error || 'Ошибка загрузки');
                this.applyData(json.data);
                this.hasData = true;
                // Load products list
                this.loadProducts();
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        },

        async refreshData() {
            this.loading = true;
            this.error = null;
            try {
                const resp = await fetch('/api/analytics/refresh', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ period: this.period }),
                });
                const json = await resp.json();
                if (!resp.ok) throw new Error(json.error || 'Ошибка обновления');
                this.applyData(json.data);
                this.hasData = true;
                this.dailyData = [];
                this.loadProducts();
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        },

        async loadProducts() {
            try {
                const resp = await fetch(`/api/analytics/products?period=${this.period}&per_page=10`);
                const json = await resp.json();
                if (resp.ok && json.data) {
                    this.productsList = json.data.items || [];
                }
            } catch (e) {
                console.error('Error loading products:', e);
            }
        },

        async loadDailyData() {
            this.loadingDaily = true;
            try {
                const resp = await fetch(`/api/analytics/daily?period=${this.period}`);
                const json = await resp.json();
                if (resp.ok && json.data) {
                    this.dailyData = json.data;
                    this.$nextTick(() => this.initSalesChart());
                }
            } catch (e) {
                console.error('Error loading daily data:', e);
            } finally {
                this.loadingDaily = false;
            }
        },

        applyData(data) {
            if (!data) return;
            const k = data.kpi || {};
            this.kpi = {
                revenue: k.revenue || 0,
                orders: k.orders || 0,
                avgCheck: k.avgCheck || 0,
                buyouts: k.buyouts || 0,
                cancels: k.cancels || 0,
                openCardCount: k.openCardCount || 0,
                addToCartCount: k.addToCartCount || 0,
                dynamics: data.dynamics || { revenue: null, orders: null, buyouts: null },
                conversions: data.conversions || { addToCartPercent: 0, cartToOrderPercent: 0, buyoutPercent: 0 },
            };
            this.topProducts = data.topProducts || [];
            if (data.dailyData && data.dailyData.length) {
                this.dailyData = data.dailyData;
            }
            if (data.created_at) {
                this.dataAge = new Date(data.created_at).toLocaleString('ru-RU');
            }

            this.$nextTick(() => {
                this.initSparklines();
                this.initFunnelChart();
                if (this.dailyData.length) {
                    this.initSalesChart();
                }
            });
        },

        initSparklines() {
            const sparkOpts = (color, data) => ({
                type: 'line',
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: { x: { display: false }, y: { display: false } },
                    elements: { point: { radius: 0 }, line: { borderWidth: 2, tension: 0.4 } },
                },
                data: {
                    labels: data.map(() => ''),
                    datasets: [{
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '20',
                        fill: true,
                    }]
                }
            });

            // Generate sparkline data from daily data or random placeholder
            const daily = this.dailyData;
            const revData = daily.length ? daily.map(d => d.orderSum) : Array.from({ length: 7 }, () => Math.random() * 40 + 60);
            const ordData = daily.length ? daily.map(d => d.orderCount) : Array.from({ length: 7 }, () => Math.random() * 40 + 60);
            const avgData = daily.length ? daily.map(d => d.orderCount ? d.orderSum / d.orderCount : 0) : Array.from({ length: 7 }, () => Math.random() * 40 + 60);
            const buyData = daily.length ? daily.map(d => d.buyoutCount) : Array.from({ length: 7 }, () => Math.random() * 40 + 60);

            // Destroy existing charts
            Object.values(this.sparkCharts).forEach(c => c && c.destroy());

            if (this.$refs.sparkRevenue) this.sparkCharts.revenue = new Chart(this.$refs.sparkRevenue, sparkOpts('#6366f1', revData));
            if (this.$refs.sparkOrders) this.sparkCharts.orders = new Chart(this.$refs.sparkOrders, sparkOpts('#3b82f6', ordData));
            if (this.$refs.sparkAvgCheck) this.sparkCharts.avgCheck = new Chart(this.$refs.sparkAvgCheck, sparkOpts('#10b981', avgData));
            if (this.$refs.sparkBuyouts) this.sparkCharts.buyouts = new Chart(this.$refs.sparkBuyouts, sparkOpts('#f59e0b', buyData));
        },

        initSalesChart() {
            if (!this.dailyData.length || !this.$refs.salesChart) return;
            if (this.salesChart) this.salesChart.destroy();

            const labels = this.dailyData.map(d => {
                const dt = new Date(d.date);
                return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
            });

            this.salesChart = new Chart(this.$refs.salesChart, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Заказы (руб)',
                            data: this.dailyData.map(d => d.orderSum),
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99,102,241,0.08)',
                            fill: true, tension: 0.4, borderWidth: 2,
                            pointBackgroundColor: '#6366f1', pointRadius: 3, pointHoverRadius: 6,
                        },
                        {
                            label: 'Заказы (шт)',
                            data: this.dailyData.map(d => d.orderCount),
                            borderColor: '#34d399',
                            backgroundColor: 'rgba(52,211,153,0.08)',
                            fill: true, tension: 0.4, borderWidth: 2,
                            pointBackgroundColor: '#34d399', pointRadius: 3, pointHoverRadius: 6,
                            yAxisID: 'y1',
                        },
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e1b4b', titleColor: '#e0e7ff', bodyColor: '#c7d2fe', cornerRadius: 12, padding: 12 } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#9ca3af' } },
                        y: { grid: { color: '#f3f4f6' }, ticks: { color: '#9ca3af', callback: v => (v/1000) + 'k' } },
                        y1: { position: 'right', grid: { display: false }, ticks: { color: '#9ca3af' } },
                    }
                }
            });
        },

        initFunnelChart() {
            if (!this.$refs.funnelDonut) return;
            if (this.funnelChart) this.funnelChart.destroy();

            this.funnelChart = new Chart(this.$refs.funnelDonut, {
                type: 'doughnut',
                data: {
                    labels: ['Просмотры', 'Корзина', 'Заказы', 'Выкупы'],
                    datasets: [{
                        data: [
                            this.kpi.openCardCount,
                            this.kpi.addToCartCount,
                            this.kpi.orders,
                            this.kpi.buyouts,
                        ],
                        backgroundColor: ['#6366f1', '#3b82f6', '#10b981', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 8,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: '#1e1b4b', cornerRadius: 12, padding: 12 },
                    }
                }
            });
        },
    };
}
</script>
{% endblock %}
