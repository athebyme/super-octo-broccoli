{% extends "base.html" %}

{% block title %}Группы конкурентов - Seller Hub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="competitorGroups()">

    <!-- Header -->
    <div class="mb-8 relative bg-[#0a0a0a] rounded-lg p-6 sm:p-8">
        <div class="relative flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-normal text-white" style="font-family:'Instrument Serif',Georgia,serif;font-style:italic">Группы конкурентов</h1>
                <p class="mt-1 text-sm text-gray-400">Организуйте конкурентов по группам для удобного отслеживания</p>
            </div>
            <button @click="showCreateModal = true"
                class="px-4 py-2 text-sm rounded-md bg-white text-[#1a1a1a] font-semibold hover:bg-gray-100 transition-all">
                + Создать группу
            </button>
        </div>
    </div>

    <!-- Groups list -->
    <div class="space-y-4">
        <template x-for="group in groups" :key="group.id">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full" :style="'background-color:' + group.color"></div>
                        <div>
                            <a :href="'/competitors/groups/' + group.id" class="text-lg font-semibold text-gray-900 hover:text-indigo-600" x-text="group.name"></a>
                            <p class="text-sm text-gray-500" x-text="group.description || ''"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-500" x-text="group.products_count + ' товаров'"></span>
                        <template x-if="group.auto_source !== 'manual'">
                            <span class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded-full" x-text="group.auto_source === 'seller' ? 'По продавцу' : 'По категории'"></span>
                        </template>
                        <button @click="editGroup(group)" class="p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-50">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </button>
                        <button @click="deleteGroup(group)" class="p-2 text-gray-400 hover:text-red-600 rounded-lg hover:bg-red-50">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <template x-if="groups.length === 0">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-12 text-center">
            <p class="text-gray-500 mb-4">Создайте первую группу для отслеживания конкурентов</p>
            <button @click="showCreateModal = true" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">
                Создать группу
            </button>
        </div>
    </template>

    <!-- Create/Edit Modal -->
    <template x-if="showCreateModal">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="showCreateModal = false">
            <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full mx-4 p-6">
                <h3 class="text-lg font-semibold mb-4" x-text="editingGroup ? 'Редактировать группу' : 'Создать группу'"></h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Название</label>
                        <input type="text" x-model="form.name" placeholder="Например: Конкуренты по футболкам"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                        <input type="text" x-model="form.description" placeholder="Опционально"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Цвет</label>
                        <div class="flex gap-2">
                            <template x-for="c in colors" :key="c">
                                <button @click="form.color = c" class="w-8 h-8 rounded-full border-2 transition-all"
                                    :class="form.color === c ? 'border-gray-900 scale-110' : 'border-transparent'"
                                    :style="'background-color:' + c"></button>
                            </template>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button @click="showCreateModal = false; editingGroup = null"
                        class="px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg">Отмена</button>
                    <button @click="saveGroup()" :disabled="!form.name"
                        class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50"
                        x-text="editingGroup ? 'Сохранить' : 'Создать'"></button>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function competitorGroups() {
    return {
        groups: {{ groups|map(attribute='to_dict')|list|tojson }},
        showCreateModal: false,
        editingGroup: null,
        form: { name: '', description: '', color: '#3B82F6' },
        colors: ['#3B82F6', '#EF4444', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899', '#06B6D4', '#6B7280'],

        editGroup(group) {
            this.editingGroup = group;
            this.form = { name: group.name, description: group.description || '', color: group.color };
            this.showCreateModal = true;
        },

        async saveGroup() {
            const csrf = document.querySelector('meta[name=csrf-token]')?.content;
            const headers = {'Content-Type': 'application/json', 'X-CSRFToken': csrf};

            if (this.editingGroup) {
                const res = await fetch(`/api/competitors/groups/${this.editingGroup.id}`, {
                    method: 'PUT', headers, body: JSON.stringify(this.form)
                });
                const data = await res.json();
                const idx = this.groups.findIndex(g => g.id === this.editingGroup.id);
                if (idx >= 0) this.groups[idx] = data;
            } else {
                const res = await fetch('/api/competitors/groups', {
                    method: 'POST', headers, body: JSON.stringify(this.form)
                });
                const data = await res.json();
                this.groups.unshift(data);
            }

            this.showCreateModal = false;
            this.editingGroup = null;
            this.form = { name: '', description: '', color: '#3B82F6' };
        },

        async deleteGroup(group) {
            if (!confirm(`Удалить группу "${group.name}" и все товары в ней?`)) return;
            const csrf = document.querySelector('meta[name=csrf-token]')?.content;
            await fetch(`/api/competitors/groups/${group.id}`, {
                method: 'DELETE', headers: {'X-CSRFToken': csrf}
            });
            this.groups = this.groups.filter(g => g.id !== group.id);
        }
    }
}
</script>
{% endblock %}
