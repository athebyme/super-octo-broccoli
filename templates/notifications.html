{% extends "base.html" %}

{% block title %}Уведомления - Seller Hub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="notificationsPage()">

    <!-- Header -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div class="flex items-center gap-3">
            <h1 class="text-3xl font-bold text-gray-900">Уведомления</h1>
            <span x-show="unreadCount > 0" class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-indigo-600 text-white text-xs font-bold" x-text="unreadCount"></span>
        </div>
        <div class="flex items-center gap-2">
            <button @click="markAllRead()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Прочитать все
            </button>
            <button @click="clearAll()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Очистить
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="mb-6 flex items-center gap-2 overflow-x-auto pb-2">
        <template x-for="f in filterOptions" :key="f.value">
            <button @click="activeFilter = f.value"
                :class="activeFilter === f.value
                    ? 'bg-indigo-600 text-white shadow-md'
                    : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
                class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium transition-all whitespace-nowrap">
                <span x-text="f.label"></span>
                <span x-show="f.count > 0"
                    :class="activeFilter === f.value ? 'bg-white/20' : 'bg-gray-100'"
                    class="inline-flex items-center justify-center w-5 h-5 rounded-full text-xs" x-text="f.count"></span>
            </button>
        </template>
    </div>

    <!-- Notifications List -->
    <div class="space-y-8">
        <template x-for="group in filteredGroups" :key="group.label">
            <div x-show="group.items.length > 0" x-transition>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-1" x-text="group.label"></h3>
                <div class="space-y-2">
                    <template x-for="(notif, idx) in group.items" :key="notif.id">
                        <div x-show="!notif.dismissed"
                            x-transition:enter="transition ease-out duration-200"
                            x-transition:enter-start="opacity-0 translate-y-2"
                            x-transition:enter-end="opacity-100 translate-y-0"
                            x-transition:leave="transition ease-in duration-150"
                            x-transition:leave-start="opacity-100 translate-y-0"
                            x-transition:leave-end="opacity-0 -translate-x-8"
                            :class="notif.read ? 'opacity-60' : ''"
                            class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all">
                            <div class="flex items-start gap-4 p-4">
                                <!-- Color bar + Icon -->
                                <div class="flex-shrink-0">
                                    <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                                        :class="{
                                            'bg-gradient-to-br from-blue-400 to-blue-600': notif.type === 'info',
                                            'bg-gradient-to-br from-amber-400 to-orange-500': notif.type === 'warning',
                                            'bg-gradient-to-br from-green-400 to-emerald-500': notif.type === 'success',
                                            'bg-gradient-to-br from-red-400 to-rose-500': notif.type === 'error',
                                            'bg-gradient-to-br from-purple-400 to-indigo-500': notif.type === 'promo',
                                        }">
                                        <!-- Info icon -->
                                        <svg x-show="notif.type === 'info'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <!-- Warning icon -->
                                        <svg x-show="notif.type === 'warning'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                                        <!-- Success icon -->
                                        <svg x-show="notif.type === 'success'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <!-- Error icon -->
                                        <svg x-show="notif.type === 'error'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <!-- Promo icon -->
                                        <svg x-show="notif.type === 'promo'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                                    </div>
                                </div>

                                <!-- Content -->
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <p class="text-sm font-semibold text-gray-900" x-text="notif.title"></p>
                                        <span x-show="notif.mp" class="text-xs px-1.5 py-0.5 rounded font-medium"
                                            :class="notif.mp === 'WB' ? 'bg-pink-50 text-pink-600' : notif.mp === 'Ozon' ? 'bg-blue-50 text-blue-600' : 'bg-yellow-50 text-yellow-600'"
                                            x-text="notif.mp"></span>
                                        <span x-show="!notif.read" class="w-2 h-2 rounded-full bg-indigo-500 flex-shrink-0"></span>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-2" x-text="notif.message"></p>
                                    <p class="text-xs text-gray-400" x-text="notif.time"></p>
                                </div>

                                <!-- Actions -->
                                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click="toggleRead(notif)" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" :title="notif.read ? 'Как непрочитанное' : 'Прочитать'">
                                        <svg x-show="!notif.read" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                        <svg x-show="notif.read" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                    </button>
                                    <button @click="dismiss(notif)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Удалить">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Empty State -->
        <div x-show="allDismissed" x-transition class="text-center py-16">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gray-100 mb-6">
                <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Нет уведомлений</h3>
            <p class="text-sm text-gray-500 max-w-sm mx-auto">
                Когда появятся новые заказы, изменения цен или системные события — вы увидите их здесь.
            </p>
        </div>
    </div>
</div>

<script>
function notificationsPage() {
    return {
        activeFilter: 'all',
        notifications: [
            { id: 1, type: 'success', title: 'Заказ доставлен', message: 'Заказ #WB-28491 "Футболка оверсайз Premium" успешно доставлен покупателю.', mp: 'WB', time: '14:32', group: 'today', read: false, dismissed: false },
            { id: 2, type: 'warning', title: 'Цена изменена конкурентом', message: 'Конкурент снизил цену на "Кроссовки AIR" на 15%. Рекомендуем проверить вашу ценовую стратегию.', mp: 'Ozon', time: '13:15', group: 'today', read: false, dismissed: false },
            { id: 3, type: 'info', title: 'Новый заказ', message: 'Получен новый заказ #YM-7823 на сумму 4 290 руб. Ожидает подтверждения.', mp: 'YM', time: '12:48', group: 'today', read: false, dismissed: false },
            { id: 4, type: 'error', title: 'Ошибка синхронизации', message: 'Не удалось синхронизировать остатки товаров. API ключ может быть недействителен. Проверьте настройки.', mp: 'Ozon', time: '11:05', group: 'today', read: false, dismissed: false },
            { id: 5, type: 'success', title: 'Отчёт сформирован', message: 'Финансовый отчёт за февраль 2026 готов к скачиванию.', mp: null, time: '22:10', group: 'yesterday', read: true, dismissed: false },
            { id: 6, type: 'warning', title: 'Низкий остаток', message: 'Товар "Рюкзак городской 25L" — осталось 3 шт. на складе WB. Рекомендуем пополнить.', mp: 'WB', time: '19:35', group: 'yesterday', read: true, dismissed: false },
            { id: 7, type: 'info', title: 'Синхронизация завершена', message: 'Каталог товаров успешно синхронизирован. Обновлено 47 карточек.', mp: 'WB', time: '17:22', group: 'yesterday', read: true, dismissed: false },
            { id: 8, type: 'promo', title: 'Новая функция: ABC-анализ', message: 'Теперь в разделе аналитики доступен ABC-анализ товаров. Узнайте, какие товары приносят максимум прибыли.', mp: null, time: '25 фев', group: 'earlier', read: true, dismissed: false },
            { id: 9, type: 'success', title: 'Массовое обновление цен', message: 'Успешно обновлены цены на 23 товара на Wildberries.', mp: 'WB', time: '24 фев', group: 'earlier', read: true, dismissed: false },
            { id: 10, type: 'info', title: 'Яндекс Маркет подключен', message: 'Вы успешно подключили Яндекс Маркет. Начните настройку каталога товаров.', mp: 'YM', time: '22 фев', group: 'earlier', read: true, dismissed: false },
        ],

        get filterOptions() {
            const active = this.notifications.filter(n => !n.dismissed);
            return [
                { label: 'Все', value: 'all', count: active.length },
                { label: 'Важные', value: 'warning', count: active.filter(n => n.type === 'warning' || n.type === 'error').length },
                { label: 'Заказы', value: 'success', count: active.filter(n => n.type === 'success').length },
                { label: 'Система', value: 'info', count: active.filter(n => n.type === 'info' || n.type === 'promo').length },
            ];
        },

        get unreadCount() {
            return this.notifications.filter(n => !n.read && !n.dismissed).length;
        },

        get allDismissed() {
            return this.notifications.every(n => n.dismissed);
        },

        get filteredGroups() {
            const groups = [
                { label: 'Сегодня', key: 'today' },
                { label: 'Вчера', key: 'yesterday' },
                { label: 'Ранее', key: 'earlier' },
            ];
            return groups.map(g => ({
                label: g.label,
                items: this.notifications.filter(n => {
                    if (n.dismissed) return false;
                    if (n.group !== g.key) return false;
                    if (this.activeFilter === 'all') return true;
                    if (this.activeFilter === 'warning') return n.type === 'warning' || n.type === 'error';
                    if (this.activeFilter === 'success') return n.type === 'success';
                    if (this.activeFilter === 'info') return n.type === 'info' || n.type === 'promo';
                    return true;
                })
            }));
        },

        toggleRead(notif) {
            notif.read = !notif.read;
        },

        dismiss(notif) {
            notif.dismissed = true;
        },

        markAllRead() {
            this.notifications.forEach(n => n.read = true);
        },

        clearAll() {
            this.notifications.forEach(n => n.dismissed = true);
        },
    };
}
</script>
{% endblock %}
