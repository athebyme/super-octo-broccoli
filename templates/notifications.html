{% extends "base.html" %}

{% block title %}Уведомления - Seller Hub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="notificationsPage()">

    <!-- Header -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div class="flex items-center gap-3">
            <h1 class="text-3xl font-bold text-gray-900">Уведомления</h1>
            <span x-show="unreadCount > 0" class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-indigo-600 text-white text-xs font-bold" x-text="unreadCount"></span>
        </div>
        <div class="flex items-center gap-2">
            <button @click="markAllRead()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Прочитать все
            </button>
            <button @click="clearAll()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Очистить
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="mb-6 flex items-center gap-2 overflow-x-auto pb-2">
        <template x-for="f in filterOptions" :key="f.value">
            <button @click="activeFilter = f.value; loadNotifications()"
                :class="activeFilter === f.value
                    ? 'bg-indigo-600 text-white shadow-md'
                    : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'"
                class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium transition-all whitespace-nowrap">
                <span x-text="f.label"></span>
            </button>
        </template>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-8">
        <div class="inline-block w-6 h-6 border-2 border-indigo-300 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>

    <!-- Notifications List -->
    <div x-show="!loading" class="space-y-8">
        <template x-for="group in groupedNotifications" :key="group.label">
            <div x-show="group.items.length > 0" x-transition>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-1" x-text="group.label"></h3>
                <div class="space-y-2">
                    <template x-for="notif in group.items" :key="notif.id">
                        <div x-transition:leave="transition ease-in duration-150"
                            x-transition:leave-start="opacity-100"
                            x-transition:leave-end="opacity-0 -translate-x-8"
                            :class="notif.is_read ? 'opacity-60' : ''"
                            class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all">
                            <a :href="notif.link || '#'" class="flex items-start gap-4 p-4" @click="markRead(notif)">
                                <!-- Icon -->
                                <div class="flex-shrink-0">
                                    <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                                        :class="{
                                            'bg-gradient-to-br from-blue-400 to-blue-600': notif.category === 'info',
                                            'bg-gradient-to-br from-amber-400 to-orange-500': notif.category === 'warning',
                                            'bg-gradient-to-br from-green-400 to-emerald-500': notif.category === 'success',
                                            'bg-gradient-to-br from-red-400 to-rose-500': notif.category === 'error',
                                            'bg-gradient-to-br from-purple-400 to-indigo-500': notif.category === 'promo',
                                        }">
                                        <svg x-show="notif.category === 'info'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <svg x-show="notif.category === 'warning'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                                        <svg x-show="notif.category === 'success'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <svg x-show="notif.category === 'error'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <svg x-show="notif.category === 'promo'" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                                    </div>
                                </div>

                                <!-- Content -->
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <p class="text-sm font-semibold text-gray-900" x-text="notif.title"></p>
                                        <span x-show="!notif.is_read" class="w-2 h-2 rounded-full bg-indigo-500 flex-shrink-0"></span>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-2" x-text="notif.message"></p>
                                    <p class="text-xs text-gray-400" x-text="formatTime(notif.created_at)"></p>
                                </div>

                                <!-- Actions -->
                                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity" @click.prevent.stop>
                                    <button @click="toggleRead(notif)" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" :title="notif.is_read ? 'Как непрочитанное' : 'Прочитать'">
                                        <svg x-show="!notif.is_read" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                        <svg x-show="notif.is_read" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                    </button>
                                    <button @click="deleteNotif(notif)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Удалить">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                            </a>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Empty State -->
        <div x-show="!loading && notifications.length === 0" x-transition class="text-center py-16">
            <div class="inline-block mb-6">
                <svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="85" r="70" fill="#EEF2FF"/>
                    <circle cx="100" cy="85" r="55" fill="#E0E7FF"/>
                    <path d="M100 30C82 30 68 44 68 62V90C68 90 60 98 58 102C56 106 58 110 62 110H138C142 110 144 106 142 102C140 98 132 90 132 90V62C132 44 118 30 100 30Z" fill="#818CF8" stroke="#6366F1" stroke-width="2"/>
                    <path d="M78 55C78 55 82 40 100 35" stroke="#C7D2FE" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="100" cy="118" r="8" fill="#6366F1"/>
                    <path d="M90 110C90 110 92 126 100 126C108 126 110 110 110 110" stroke="#6366F1" stroke-width="2" fill="none"/>
                    <circle cx="48" cy="45" r="4" fill="#C7D2FE" opacity="0.8"><animate attributeName="cy" values="45;40;45" dur="3s" repeatCount="indefinite"/></circle>
                    <circle cx="155" cy="55" r="3" fill="#A5B4FC" opacity="0.7"><animate attributeName="cy" values="55;48;55" dur="2.5s" repeatCount="indefinite"/></circle>
                    <text x="130" y="42" font-size="14" font-weight="bold" fill="#A5B4FC" opacity="0.7">z</text>
                    <text x="140" y="32" font-size="11" font-weight="bold" fill="#C7D2FE" opacity="0.5">z</text>
                    <text x="148" y="24" font-size="9" font-weight="bold" fill="#E0E7FF" opacity="0.4">z</text>
                    <ellipse cx="100" cy="150" rx="50" ry="6" fill="#E0E7FF" opacity="0.5"/>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Нет уведомлений</h3>
            <p class="text-sm text-gray-500 max-w-sm mx-auto">
                Когда появятся новые заказы, изменения цен или системные события — вы увидите их здесь.
            </p>
        </div>
    </div>
</div>

<script>
function notificationsPage() {
    return {
        activeFilter: 'all',
        notifications: [],
        loading: true,

        filterOptions: [
            { label: 'Все', value: 'all' },
            { label: 'Важные', value: 'important' },
            { label: 'Успешные', value: 'success' },
            { label: 'Система', value: 'system' },
        ],

        get unreadCount() {
            return this.notifications.filter(n => !n.is_read).length;
        },

        get groupedNotifications() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today - 86400000);

            const groups = [
                { label: 'Сегодня', items: [] },
                { label: 'Вчера', items: [] },
                { label: 'Ранее', items: [] },
            ];

            for (const n of this.notifications) {
                const d = new Date(n.created_at);
                if (d >= today) groups[0].items.push(n);
                else if (d >= yesterday) groups[1].items.push(n);
                else groups[2].items.push(n);
            }
            return groups;
        },

        async init() {
            await this.loadNotifications();
            // Refresh global badge
            if (Alpine.store('notif')) Alpine.store('notif').poll();
        },

        async loadNotifications() {
            this.loading = true;
            try {
                let url = '/api/notifications?limit=100';
                if (this.activeFilter === 'important') url += '&category=warning';
                if (this.activeFilter === 'success') url += '&category=success';
                if (this.activeFilter === 'system') url += '&category=info';
                const r = await fetch(url);
                if (!r.ok) {
                    console.error('Notifications API error:', r.status, r.statusText);
                    this.notifications = [];
                    this.loading = false;
                    return;
                }
                const d = await r.json();
                this.notifications = d.items || [];
            } catch(e) {
                console.error('Notifications load error:', e);
                this.notifications = [];
            }
            this.loading = false;
        },

        formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if (d >= today) return d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
            const yesterday = new Date(today - 86400000);
            if (d >= yesterday) return 'Вчера ' + d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
            return d.toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'});
        },

        async markRead(notif) {
            if (!notif.is_read) {
                notif.is_read = true;
                await fetch(`/api/notifications/${notif.id}/read`, {method: 'POST'});
                if (Alpine.store('notif')) Alpine.store('notif').poll();
            }
        },

        async toggleRead(notif) {
            // Only mark as read (we don't support unread via API for simplicity)
            await this.markRead(notif);
        },

        async deleteNotif(notif) {
            this.notifications = this.notifications.filter(n => n.id !== notif.id);
            await fetch(`/api/notifications/${notif.id}`, {method: 'DELETE'});
            if (Alpine.store('notif')) Alpine.store('notif').poll();
        },

        async markAllRead() {
            this.notifications.forEach(n => n.is_read = true);
            await fetch('/api/notifications/read-all', {method: 'POST'});
            sessionStorage.removeItem('_notif_initial_shown');
            if (Alpine.store('notif')) Alpine.store('notif').poll();
        },

        async clearAll() {
            // Mark all as read first, then clear read ones
            await fetch('/api/notifications/read-all', {method: 'POST'});
            await fetch('/api/notifications/clear', {method: 'POST'});
            this.notifications = [];
            sessionStorage.removeItem('_notif_initial_shown');
            if (Alpine.store('notif')) Alpine.store('notif').poll();
        },
    };
}
</script>
{% endblock %}
