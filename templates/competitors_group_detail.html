{% extends "base.html" %}

{% block title %}{{ group.name }} - Конкуренты{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="groupDetail()">

    <!-- Header -->
    <div class="mb-8 relative bg-[#0a0a0a] rounded-lg p-6 sm:p-8">
        <div class="relative flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <a href="{{ url_for('competitors_dashboard') }}" class="text-gray-400 hover:text-white text-sm">&larr; Конкуренты</a>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-4 h-4 rounded-full" style="background-color: {{ group.color }}"></div>
                    <h1 class="text-3xl font-normal text-white" style="font-family:'Instrument Serif',Georgia,serif;font-style:italic">{{ group.name }}</h1>
                </div>
                <p class="mt-1 text-sm text-gray-400">{{ group.description or '' }} &middot; <span x-text="products.length"></span> товаров</p>
            </div>
            <div class="flex items-center gap-3">
                <button @click="showAddModal = true"
                    class="px-4 py-2 text-sm rounded-md bg-white text-[#1a1a1a] font-semibold hover:bg-gray-100 transition-all">
                    + Добавить товары
                </button>
            </div>
        </div>
    </div>

    <!-- Products table -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Товар</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Цена</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Со скидкой</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Рейтинг</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Отзывы</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Остаток</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Обновлено</th>
                        <th class="px-4 py-3"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="p in products" :key="p.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-3">
                                    <img :src="p.image_url || ''" class="w-10 h-10 rounded-lg object-cover bg-gray-100"
                                        onerror="this.style.display='none'">
                                    <div class="min-w-0">
                                        <a :href="'https://www.wildberries.ru/catalog/' + p.nm_id + '/detail.aspx'" target="_blank"
                                            class="text-sm font-medium text-gray-900 hover:text-indigo-600 truncate block max-w-[300px]" x-text="p.title || ('nm: ' + p.nm_id)"></a>
                                        <p class="text-xs text-gray-500" x-text="(p.brand || '') + (p.supplier_name ? ' / ' + p.supplier_name : '')"></p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-right text-sm text-gray-500" x-text="p.current_price ? (p.current_price + ' ₽') : '—'"></td>
                            <td class="px-4 py-3 text-right text-sm font-medium text-gray-900" x-text="p.current_sale_price ? (p.current_sale_price + ' ₽') : '—'"></td>
                            <td class="px-4 py-3 text-right text-sm">
                                <span x-text="p.current_rating ? p.current_rating.toFixed(1) : '—'"></span>
                            </td>
                            <td class="px-4 py-3 text-right text-sm text-gray-500" x-text="p.current_feedbacks_count || '—'"></td>
                            <td class="px-4 py-3 text-right text-sm" :class="p.current_total_stock === 0 ? 'text-red-600 font-medium' : 'text-gray-500'"
                                x-text="p.current_total_stock !== null ? p.current_total_stock : '—'"></td>
                            <td class="px-4 py-3 text-right text-xs text-gray-400"
                                x-text="p.last_fetched_at ? new Date(p.last_fetched_at).toLocaleString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : 'нет'"></td>
                            <td class="px-4 py-3 text-right">
                                <div class="flex items-center gap-1">
                                    <button @click="showHistory(p)" class="p-1.5 text-gray-400 hover:text-indigo-600 rounded hover:bg-indigo-50" title="История цен">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                                    </button>
                                    <button @click="removeProduct(p)" class="p-1.5 text-gray-400 hover:text-red-600 rounded hover:bg-red-50" title="Удалить">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <template x-if="products.length === 0">
            <div class="p-12 text-center text-gray-500">
                <p>В группе пока нет товаров</p>
                <button @click="showAddModal = true" class="mt-3 text-indigo-600 text-sm hover:underline">Добавить товары</button>
            </div>
        </template>
    </div>

    <!-- Price History Modal -->
    <template x-if="historyProduct">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="historyProduct = null">
            <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full mx-4 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold" x-text="'История цен: ' + (historyProduct.title || historyProduct.nm_id)"></h3>
                    <button @click="historyProduct = null" class="text-gray-400 hover:text-gray-600">&times;</button>
                </div>
                <div class="h-64">
                    <canvas x-ref="historyChart"></canvas>
                </div>
            </div>
        </div>
    </template>

    <!-- Add Products Modal -->
    <template x-if="showAddModal">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="showAddModal = false">
            <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full mx-4 p-6">
                <h3 class="text-lg font-semibold mb-4">Добавить товары</h3>

                <!-- Tabs -->
                <div class="flex gap-1 mb-4 bg-gray-100 rounded-lg p-1">
                    <button @click="addMode = 'nm_ids'" :class="addMode === 'nm_ids' ? 'bg-white shadow-sm' : ''"
                        class="flex-1 px-3 py-1.5 text-sm rounded-md transition-all">По артикулу</button>
                    <button @click="addMode = 'search'" :class="addMode === 'search' ? 'bg-white shadow-sm' : ''"
                        class="flex-1 px-3 py-1.5 text-sm rounded-md transition-all">Поиск</button>
                    <button @click="addMode = 'seller'" :class="addMode === 'seller' ? 'bg-white shadow-sm' : ''"
                        class="flex-1 px-3 py-1.5 text-sm rounded-md transition-all">По продавцу</button>
                </div>

                <!-- By nm_ids -->
                <div x-show="addMode === 'nm_ids'" class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Артикулы WB (nm_id)</label>
                        <textarea x-model="addForm.nm_ids" rows="3" placeholder="Введите артикулы через запятую: 12345, 67890, ..."
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                    </div>
                </div>

                <!-- By search -->
                <div x-show="addMode === 'search'" class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Поисковый запрос</label>
                        <input type="text" x-model="addForm.search_query" placeholder="Например: футболка мужская"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                </div>

                <!-- By seller -->
                <div x-show="addMode === 'seller'" class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ID продавца на WB</label>
                        <input type="number" x-model="addForm.wb_supplier_id" placeholder="Например: 123456"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                </div>

                <template x-if="addResult">
                    <div class="mt-3 p-3 rounded-lg text-sm" :class="addResult.error ? 'bg-red-50 text-red-700' : 'bg-green-50 text-green-700'"
                        x-text="addResult.error || ('Добавлено: ' + addResult.added + ', пропущено: ' + addResult.skipped)"></div>
                </template>

                <div class="flex justify-end gap-3 mt-6">
                    <button @click="showAddModal = false" class="px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg">Закрыть</button>
                    <button @click="addProducts()" :disabled="adding"
                        class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                        <template x-if="adding"><span>Добавляем...</span></template>
                        <template x-if="!adding"><span>Добавить</span></template>
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
function groupDetail() {
    return {
        products: {{ products_data|tojson }},
        groupId: {{ group.id }},
        showAddModal: false,
        addMode: 'nm_ids',
        addForm: { nm_ids: '', search_query: '', wb_supplier_id: '' },
        adding: false,
        addResult: null,
        historyProduct: null,
        historyChart: null,

        async addProducts() {
            this.adding = true;
            this.addResult = null;
            const csrf = document.querySelector('meta[name=csrf-token]')?.content;
            const body = { group_id: this.groupId };

            if (this.addMode === 'nm_ids') {
                body.nm_ids = this.addForm.nm_ids;
            } else if (this.addMode === 'search') {
                body.search_query = this.addForm.search_query;
            } else if (this.addMode === 'seller') {
                body.wb_supplier_id = parseInt(this.addForm.wb_supplier_id);
            }

            try {
                const res = await fetch('/api/competitors/products', {
                    method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrf},
                    body: JSON.stringify(body)
                });
                this.addResult = await res.json();
                if (this.addResult.success) {
                    // Reload products
                    location.reload();
                }
            } catch(e) {
                this.addResult = { error: 'Ошибка при добавлении' };
            } finally {
                this.adding = false;
            }
        },

        async removeProduct(product) {
            if (!confirm('Удалить товар из мониторинга?')) return;
            const csrf = document.querySelector('meta[name=csrf-token]')?.content;
            await fetch(`/api/competitors/products/${product.id}`, {
                method: 'DELETE', headers: {'X-CSRFToken': csrf}
            });
            this.products = this.products.filter(p => p.id !== product.id);
        },

        async showHistory(product) {
            this.historyProduct = product;
            try {
                const res = await fetch(`/api/competitors/products/${product.id}/history?period=30d`);
                const data = await res.json();

                await this.$nextTick();
                const canvas = this.$refs.historyChart;
                if (!canvas) return;

                if (this.historyChart) this.historyChart.destroy();

                this.historyChart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: data.history.map(h => new Date(h.created_at).toLocaleDateString('ru-RU')),
                        datasets: [{
                            label: 'Цена со скидкой',
                            data: data.history.map(h => h.sale_price),
                            borderColor: '#3B82F6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.3,
                        }, {
                            label: 'Цена',
                            data: data.history.map(h => h.price),
                            borderColor: '#9CA3AF',
                            borderDash: [5, 5],
                            tension: 0.3,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } },
                        scales: { y: { beginAtZero: false } }
                    }
                });
            } catch(e) {
                console.error(e);
            }
        }
    }
}
</script>
{% endblock %}
