# =============================================================================
# docker-compose.prod.yml — Продакшн конфигурация для Coolify
#
# Coolify использует этот файл для деплоя.
# Для локальной разработки используйте docker-compose.yml
# =============================================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - SELLER_PORT=${SELLER_PORT:-5001}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      seller-platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - coolify.managed=true

  seller-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seller-platform
    environment:
      - APP_MODULE=seller_platform:app
      - PORT=${SELLER_PORT:-5001}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DATABASE_URL=sqlite:////app/data/seller_platform.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - SSL_CERT_PATH=${SSL_CERT_PATH:-}
      - SSL_KEY_PATH=${SSL_KEY_PATH:-}
      - SSL_COMMON_NAME=${SSL_COMMON_NAME:-seller-platform}
      - SSL_SAN_IPS=${SSL_SAN_IPS:-}
      - DISABLE_HTTP_REDIRECT=1
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    expose:
      - "${SELLER_PORT:-5001}"
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
      - seller_platform_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:${SELLER_PORT:-5001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - coolify.managed=true
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  wb-calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wb-calculator
    environment:
      - APP_MODULE=app:app
      - PORT=${CALCULATOR_PORT:-5000}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-wb-calculator-secret}
    ports:
      - "${CALCULATOR_PORT:-5000}:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:${CALCULATOR_PORT:-5000}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - coolify.managed=true

volumes:
  seller_platform_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
