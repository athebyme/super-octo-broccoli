services:
  postgres:
    image: postgres:16-alpine
    container_name: seller-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-seller_platform}
      - POSTGRES_USER=${POSTGRES_USER:-seller}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seller} -d ${POSTGRES_DB:-seller_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - SELLER_PORT=${SELLER_PORT:-5001}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - seller-platform

  seller-platform:
    build: .
    container_name: seller-platform
    environment:
      - APP_MODULE=seller_platform:app
      - PORT=${SELLER_PORT:-5001}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env file}
      # PostgreSQL — подключение к контейнеру postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-seller}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seller_platform}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Credentials для первого администратора (создается автоматически при первом запуске)
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env file}
      # SSL/HTTPS (оставьте пустыми для авто-генерации self-signed)
      - SSL_CERT_PATH=${SSL_CERT_PATH:-}
      - SSL_KEY_PATH=${SSL_KEY_PATH:-}
      - SSL_COMMON_NAME=${SSL_COMMON_NAME:-seller-platform}
      - SSL_SAN_IPS=${SSL_SAN_IPS:-}
      # HTTP→HTTPS редирект отключён — Caddy делает это сам
      - DISABLE_HTTP_REDIRECT=1
      # Публичный URL для раздачи фото (WB скачивает по этим URL)
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      # Прокси для AI и image generation (OpenRouter, OpenAI, Claude, Gemini)
      # Формат: socks5://172.17.0.1:10808  (xray SOCKS5 на хосте)
      - AI_PROXY=${AI_PROXY:-}
      - IMAGE_GEN_PROXY=${IMAGE_GEN_PROXY:-}
    # Порты НЕ пробрасываем наружу — доступ только через Caddy
    expose:
      - "${SELLER_PORT:-5001}"
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # Сервисные агенты
  # Раскомментируйте нужных агентов и заполните AGENT_ID / AGENT_API_KEY
  # (получаете при активации агента в UI: /agents → Активировать)
  #
  # Для запуска: docker compose up -d agent-seo-writer agent-category-mapper
  # ══════════════════════════════════════════════════════════

  agent-seo-writer:
    build:
      context: .
      dockerfile: Dockerfile.agents
    container_name: agent-seo-writer
    environment:
      - AGENT_NAME=seo-writer
      - PLATFORM_URL=https://seller-platform:${SELLER_PORT:-5001}
      - AGENT_ID=${AGENT_SEO_WRITER_ID:-}
      - AGENT_API_KEY=${AGENT_SEO_WRITER_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-cloudru}
      - CLOUDRU_API_KEY=${CLOUDRU_API_KEY:-}
      - CLOUDRU_BASE_URL=${CLOUDRU_BASE_URL:-https://foundation-models.api.cloud.ru/v1/}
      - CLOUDRU_MODEL=${CLOUDRU_MODEL:-openai/gpt-oss-120b}
      - LOG_LEVEL=${AGENT_LOG_LEVEL:-INFO}
    depends_on:
      seller-platform:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - agents

  agent-category-mapper:
